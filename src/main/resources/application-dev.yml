spring:
  datasource:
    url: jdbc:h2:file:./db/shopping_cart;MODE=PostgreSQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:h2:file:./db/shopping_cart;MODE=PostgreSQL;AUTO_SERVER=TRUE
    user: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: caffeine
  security:
    oauth2:
      authorizationserver:
        issuer: http://localhost:8080

logging:
  level:
    com.shopping.app: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

app:
  jwt:
    secret: dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGRldmVsb3BtZW50IG9ubHk=
    expiration-ms: 3600000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:4200
