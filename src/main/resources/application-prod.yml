spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/shopping_cart
    username: shopping_app
    password: ${DB_PASSWORD:shopping_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
  security:
    oauth2:
      authorizationserver:
        issuer: ${APP_ISSUER_URL:http://localhost:8080}

logging:
  level:
    com.shopping.app: INFO
    root: WARN

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:3600000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
